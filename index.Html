<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Sustentável - Produto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="card-tag">Sustentável</div>
        <h2 class="card-title">Café Agroflorestal</h2>
        <p class="card-description">
            Produzido em sistema de ILPF, preservando a biodiversidade local e com pegada de carbono neutra.
        </p>
        <div class="card-actions">
            <button id="btn-like" class="btn">
                <span>❤️</span> Favoritar
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
